[pytest]
# 八卦构架2 测试框架配置
testpaths = test_framework

# 标记注册
markers =
    core: 五维核心验证（每次改 v94 必须通过）
    e2e: 端到端集成测试（三线汇合+四外围层）
    engine_v9: 引擎管线（WordNetwork+预演层+三线合并）
    mouth: 嘴巴独立测试（纯 numpy，不依赖外部）
    periphery: 外围层测试（记忆层/微风/C层/指涉层）
    arch: 架构完整性测试（阶段追踪+铁律验证）
    qi_field: qi_field线独立测试（不同结构背景温度梯度）
    slow: 慢速测试（需加载7B嵌入表，约10秒）
    patch: 补丁测试（每次讨论完追加）
    hetu: 真河图端到端测试（需5模型运行在8080-8084）
    multi_turn: 多轮对话累积测试（记忆层+微风+历史余温）

# 输出
addopts = -v --tb=short --strict-markers

# UTF-8
python_files = test_*.py
python_classes = Test*
python_functions = test_*
